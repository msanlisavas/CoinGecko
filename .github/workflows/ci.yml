name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0 # MinVer needs tag history
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            9.0.x
      - name: Restore
        run: dotnet restore CoinGecko.sln
      - name: Build
        run: dotnet build CoinGecko.sln -c Release --no-restore
      - name: Format check
        if: matrix.os == 'ubuntu-latest'
        run: dotnet format CoinGecko.sln --verify-no-changes --no-restore
      - name: Test
        run: dotnet test CoinGecko.sln -c Release --no-build --logger "trx;LogFileName=test_results.trx" --collect:"XPlat Code Coverage"
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.os }}
          path: '**/TestResults/**'
