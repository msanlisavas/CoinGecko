name: release

# Tag-pattern matrix. Each tag triggers packing + publishing exactly one package.
#   v{semver}-api                           → CoinGecko.Api
#   v{semver}-preview-websockets            → CoinGecko.Api.WebSockets
#   v{semver}-preview-aiagenthub            → CoinGecko.Api.AiAgentHub
#   v{semver}-preview-mcp                   → CoinGecko.Api.AiAgentHub.Mcp
on:
  push:
    tags:
      - 'v*-api'
      - 'v*-preview-websockets'
      - 'v*-preview-aiagenthub'
      - 'v*-preview-mcp'

permissions:
  contents: write

jobs:
  pack-and-publish:
    name: Pack + publish to NuGet
    runs-on: ubuntu-latest
    environment: Production
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # MinVer needs full tag history

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            9.0.x

      - name: Resolve package + version from tag
        id: resolve
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"
          # Parse semver from the tag: v<major>.<minor>.<patch>-<rest>
          SEMVER=$(echo "$TAG" | sed -nE 's/^v([0-9]+\.[0-9]+\.[0-9]+)-.*/\1/p')
          if [ -z "$SEMVER" ]; then
            echo "::error::Cannot parse semver from tag: $TAG"
            exit 1
          fi
          case "$TAG" in
            *-api|*-api-*)
              PROJECT="src/CoinGecko.Api/CoinGecko.Api.csproj"
              PACKAGE="CoinGecko.Api"
              VERSION="$SEMVER"
              ;;
            *-preview-websockets|*-preview-websockets-*)
              PROJECT="src/CoinGecko.Api.WebSockets/CoinGecko.Api.WebSockets.csproj"
              PACKAGE="CoinGecko.Api.WebSockets"
              VERSION="${SEMVER}-preview"
              ;;
            *-preview-aiagenthub|*-preview-aiagenthub-*)
              PROJECT="src/CoinGecko.Api.AiAgentHub/CoinGecko.Api.AiAgentHub.csproj"
              PACKAGE="CoinGecko.Api.AiAgentHub"
              VERSION="${SEMVER}-preview"
              ;;
            *-preview-mcp|*-preview-mcp-*)
              PROJECT="src/CoinGecko.Api.AiAgentHub.Mcp/CoinGecko.Api.AiAgentHub.Mcp.csproj"
              PACKAGE="CoinGecko.Api.AiAgentHub.Mcp"
              VERSION="${SEMVER}-preview"
              ;;
            *)
              echo "::error::Unknown tag pattern: $TAG"
              exit 1
              ;;
          esac
          echo "project=$PROJECT" >> "$GITHUB_OUTPUT"
          echo "package=$PACKAGE" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Resolved: package=$PACKAGE version=$VERSION project=$PROJECT"

      - name: Restore
        run: dotnet restore CoinGecko.sln

      - name: Build
        run: dotnet build ${{ steps.resolve.outputs.project }} -c Release --no-restore -p:Version=${{ steps.resolve.outputs.version }} -p:MinVerSkip=true

      # Tests run in ci.yml on every push and PR; release doesn't re-test.

      - name: Pack
        run: dotnet pack ${{ steps.resolve.outputs.project }} -c Release --no-build -o artifacts -p:Version=${{ steps.resolve.outputs.version }} -p:MinVerSkip=true

      - name: List artifacts
        run: ls -la artifacts/

      - name: Push to NuGet
        run: dotnet nuget push 'artifacts/*.nupkg' --source https://api.nuget.org/v3/index.json --api-key ${{ secrets.NUGET_API_KEY }} --skip-duplicate

      - name: GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: 'artifacts/*'
          prerelease: ${{ contains(github.ref_name, '-preview') }}
